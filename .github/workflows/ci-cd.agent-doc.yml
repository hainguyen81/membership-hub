# ==============================================================================
# 📝 DOCUMENTATION SUB-AGENT SPECIFICATION SYNCHRONIZATION WORKFLOW
# ==============================================================================
# Automatically parses validated codebase structural architectures.
# Updates data definitions, ERDs, and API specs directly into ARCHITECTURE.md.
# ==============================================================================

name: "📝 Documentation Agent Worker"

on:
  workflow_call:
    inputs:
      phase:
        description: '🗂️ Target Phase indicator passed from master pipeline'
        required: true
        type: string
      day:
        description: '📆 Target operational execution Day number'
        required: true
        type: string

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: write
  packages: write
  id-token: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

jobs:
  execute_doc:
    name: "📝 Execute Architectural Spec Technical Writing"
    runs-on: ubuntu-latest
    steps:
      # Check whether allow for running workflow
      - name: 🛡️ Gatekeeper - Validate Administrative Access
        env:
          ALLOW_AGENTS: ${{ secrets.ALLOW_AGENTS }}
        if: ${{ env.ALLOW_AGENTS != 'true' }}
        run: |
          echo "❌ Deployment is administratively DISABLED via GitHub Secrets (secrets.ALLOW_AGENTS is not true)."
          echo "Terminating pipeline execution immediately to protect production infrastructure."
          exit 1 # Require Admin Rights
      
      # Step 1: Clone the active daily isolated feature branch into the runner execution pool
      - name: "📦 Clone Workspace Branch Assets"
        uses: actions/checkout@v4
        with:
          clean: true     # 🚀 FORCE CLEAR CACHE: Automatically run git clean -ffdx during initialization
          path: '../'     # force checkout code to root context (not ./sources, to next steps working context in ./sources)

      # Step 2: Provision a clean Python 3.10 virtual space to handle core LLM prompts
      - name: "🐍 Provision Python 3.10 Sandboxed Runtime"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Satisfy upstream communication dependencies by executing pip manager installs
      - name: "🛠️ Install Enterprise Cloud API Connecting Libraries"
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai openai anthropic

      # Step 4: Generate high-precision system documentation artifacts in English markdown formats
      - name: "📝 Trigger Senior Tech Writer Documentation Pipeline"
        env:
          AI_MODELS_KEYS_JSON: ${{ secrets.AI_MODELS_KEYS_JSON }}
        run: |
          echo "📝 Activating technical documentation parsing and synchronization..."
          python3 .ai/.agents/.sub-agents/agent-doc.py --phase "${{ inputs.phase }}" --day "${{ inputs.day }}"
