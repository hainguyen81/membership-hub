name: "☁️ GCP GAR Agent Worker"

on:
  workflow_call:
    inputs:
      phase:
        required: true
        type: string
      day:
        required: true
        type: string

jobs:
  execute_gcp:
    name: "☁️ GCP GAR Agent Worker"
    runs-on: ubuntu-latest
    
    steps:
      # Check whether allow for running workflow
      - name: 🛡️ Gatekeeper - Validate Administrative Access
        env:
          ALLOW_AGENTS: ${{ secrets.ALLOW_AGENTS }}
        if: ${{ env.ALLOW_AGENTS != 'true' }}
        run: |
          echo "❌ Deployment is administratively DISABLED via GitHub Secrets (secrets.ALLOW_AGENTS is not true)."
          echo "Terminating pipeline execution immediately to protect production infrastructure."
          exit 1 # Require Admin Rights
      
      # Step 1: Pull target compiled files and configurations down to container machines for building docker layouts
      - name: "📦 Checkout Source Code Repository Artifacts"
        uses: actions/checkout@v4

      # Step 2: Ensure internal script processing layers have access to dedicated pipeline orchestration tools
      - name: "🐍 Provision Core Python 3.10 Runtime Environment Architecture"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # Step 3: Bind structural keys, invoke Google Cloud Platform SDK commands, and push built application packages upstream
      - name: "☁️ Execute Google Cloud Platform Container Blueprint Distribution Integration Script Task"
        env:
          GCP_SECRETS: ${{ secrets.GCP_SECRETS }}
        run: python3 .ai/.agents/.sub-agents/agent-gcp.py --phase "${{ inputs.phase }}" --day "${{ inputs.day }}"
