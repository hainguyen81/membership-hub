# ==============================================================================
# 🐳 DOCKERHUB SUB-AGENT REMOTE REGISTRY PUBLICATION WORKFLOW
# ==============================================================================
# Activated via --release flags to package production components.
# Authenticates and pushes multi-stage native container packages upstream.
# ==============================================================================

name: "🐳 DockerHub Agent Worker"

on:
  workflow_call:
    inputs:
      phase:
        description: '🗂️ Target Phase indicator passed from master pipeline'
        required: true
        type: string
      day:
        description: '📆 Target operational execution Day number'
        required: true
        type: string

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: write
  packages: write
  id-token: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

jobs:
  execute_dockerhub:
    name: "🐳 Build and Push Cross-Platform Multistage Containers"
    runs-on: ubuntu-latest
    steps:
      # Check whether allow for running workflow
      - name: 🛡️ Gatekeeper - Validate Administrative Access
        env:
          ALLOW_AGENTS: ${{ secrets.ALLOW_AGENTS }}
        if: ${{ env.ALLOW_AGENTS != 'true' }}
        run: |
          echo "❌ Deployment is administratively DISABLED via GitHub Secrets (secrets.ALLOW_AGENTS is not true)."
          echo "Terminating pipeline execution immediately to protect production infrastructure."
          exit 1 # Require Admin Rights
      
      # Step 1: Clone the active daily isolated feature branch into the runner execution pool
      - name: "📦 Clone Workspace Branch Assets"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history to enable safe local upstream branching operations
          clean: true    # 🚀 FORCE CLEAR CACHE: Automatically run git clean -ffdx during initialization
          path: '.' # force checkout code to root context (not ./sources, to next steps working context in ./sources)

      # Step 2: Provision a clean Python 3.10 virtual space to run local container automation scripts
      - name: "🐍 Provision Python 3.10 Sandboxed Runtime"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Connect to Docker Hub APIs and stream dual multi-stage native compiled application layers
      - name: "🐳 Trigger Cross-Platform Native Image Containerization Client"
        env:
          DOCKERHUB_SECRETS: ${{ secrets.DOCKERHUB_SECRETS }}
        run: |
          echo "🐳 Launching Docker Hub container build and registry publication pipes..."
          python3 .ai/.agents/.sub-agents/agent-docker.py --phase "${{ inputs.phase }}" --day "${{ inputs.day }}"
