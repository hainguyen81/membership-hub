# ==============================================================================
# 🏢 ENTERPRISE SAAS MULTI-AGENT DEVELOPMENT LIFECYCLE ORCHESTRATOR
# ==============================================================================
# Fully compliant with strict multi-tenant isolation, cross-channel notification architecture,
# dynamic gym-style subscription tracking constraints, and automated token-saving micro-steps.
# Directs parallel standalone executions or sequential cron schedules seamlessly.
# ==============================================================================

name: "🏢 Enterprise SaaS AI Agents Pipeline"

on:
  schedule:
    - cron: '0 0 * * *' # 🕒 Automated daily scheduler trigger executed exactly at 00:00 UTC
  workflow_dispatch:
    inputs:
      execution_mode:
        description: '🎯 Execution Mode Selection'
        required: true
        default: 'all_scheduled'
        type: choice
        options:
          - 'all_scheduled'     # 🚀 Executes the full multi-agent sequence or advances standard cron timeline
          - 'standalone_agent'  # 🧩 Triggers a SINGLE sub-agent targeting an isolated day/phase partition
      target_scope:
        description: '📅 Target Scope Configuration (Day or Phase focused)'
        required: true
        default: 'by_day'
        type: choice
        options:
          - 'by_day'            # 📆 Evaluates structural execution matrices using specific target Day number
          - 'by_phase'          # 🗂️ Evaluates structural execution matrices using specific target Phase number
      input_value:
        description: '⏱️ Enter Day number (1-24) OR Phase number (1-4). Leave EMPTY for Auto-Advance.'
        required: false
        type: string
        default: ''
      standalone_target:
        description: '🧩 IF standalone_agent mode is active, select the target operational Sub-Agent:'
        required: false
        default: 'none'
        type: choice
        options:
          - 'none'
          - 'coder'
          - 'tester'
          - 'fixer'
          - 'doc'
          - 'docker'
          - 'gcp'
          - 'gke'
      release_flag:
        description: '📢 Enable Release Flag (Activates infrastructure Agents: Docker, GCP, GKE)'
        required: false
        type: boolean
        default: false

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: write
  packages: write
  id-token: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

jobs:
  # ==============================================================================
  # JOB 1: STATE RESOLVER, COMPLIANCE GIT ISOLATION, AND GATEKEEPER
  # ==============================================================================
  state_resolver_job:
    name: "🗄️ State Resolver & Git Isolation Gatekeeper"
    runs-on: ubuntu-latest
    
    outputs:
      run_day: ${{ steps.resolver.outputs.run_day }}
      run_phase: ${{ steps.resolver.outputs.run_phase }}
      exec_mode: ${{ github.event.inputs.execution_mode || 'all_scheduled' }}
      standalone_target: ${{ github.event.inputs.standalone_target || 'none' }}
      release_flag: ${{ github.event.inputs.release_flag || 'false' }}
    
    steps:
      # Block 1.1: Administrative gate check protecting centralized production ecosystems
      - name: "🛡️ Gatekeeper - Validate Administrative Execution Tokens"
        env:
          ALLOW_AGENTS: ${{ secrets.ALLOW_AGENTS }}
        if: ${{ env.ALLOW_AGENTS != 'true' }}
        run: |
          echo "❌ [ADMIN REJECTION] Deployment is administratively DISABLED via GitHub Secrets configuration."
          echo "Terminating workflow execution thread immediately to secure staging cloud clusters."
          exit 1
      
      # Block 1.2: Shallow checkout mapping baseline code repository trees into runner memory spaces
      - name: "📦 Fetch Core Codebase Repository Assets"
        uses: actions/checkout@v7
        with:
          path: '.'
          fetch-depth: 0
          clean: true
      
      # Block 1.2.1: Debug project check-out structure
      - name: "⚙️ Config $PROJECT_WORKSPACE enviroment after checking out"
        id: project-workspace
        run: |
          CURRENT_PWD=$(pwd)
          echo "PROJECT_WORKSPACE=$CURRENT_PWD" >> $GITHUB_ENV
          echo "project_workspace=$CURRENT_PWD" >> $GITHUB_OUTPUT
          echo "⚙️ >> PROJECT_WORKSPACE: $CURRENT_PWD"
          
          # Debug step: Verify files exist physically in the workspace console log before AI execution path starts
          echo "🐛 [DEBUG] Auditing active workspace files presence (../../):"
          ls -la ../../
          echo "🐛 [DEBUG] Auditing active workspace files presence (../):"
          ls -la ../
          echo "🐛 [DEBUG] Auditing active workspace files presence (./):"
          ls -la ./
          echo "🐛 [DEBUG] Auditing active workspace files presence (membership-hub/):"
          if [ -d "membership-hub" ]; then ls -la membership-hub/; fi
          echo "🐛 [DEBUG] Auditing active workspace files presence (.ai/):"
          if [ -d ".ai" ]; then ls -la .ai/; fi
          
          echo "🔍 [ CHECKPOINT ] Check files on branch with commit status:"
          git status || true
      
      # Block 1.3: Inject secure global environment parameters and service boundaries
      - name: "🔧 [ features/development ] Configure Machine Git Automation Credentials"
        working-directory: ${{ env.PROJECT_WORKSPACE }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          # Pull all commits from sub-agents
          git pull origin "features/development" --rebase || true
      
      # Block 1.4: Core State Machine execution manipulating temporal parameters and daily isolated branch forks
      - name: "🗄️ [ features/development ] Execute Pipeline Parameters Resolution and Git Fork Compliance"
        working-directory: ${{ env.PROJECT_WORKSPACE }}
        run: |
          # 🚀 HARD RESET & WIPE LOCAL CACHE: Vaporize ALL untracked, ignored, and phantom cached indexing files instantly
          git reset --hard HEAD
          git clean -ffdx
          
          BRANCH_NAME="features/development"
          echo "- Checkout branch: $BRANCH_NAME"
          
          # Initialize independent sub-branch tracking layer cleanly
          if git show-ref --verify --quiet "refs/heads/$BRANCH_NAME" || git show-ref --verify --quiet "refs/remotes/origin/$BRANCH_NAME"; then
            echo "🌿 [GIT ALREADY EXISTS] Target daily workspace branch detected. Shifting contexts..."
            # Wipe again right before shifting to the existing target daily development branch
            git checkout -f "$BRANCH_NAME"
            
            echo "- Merge master to $BRANCH_NAME"
            git merge origin/master --no-ff -m "ci: auto-merge master into $BRANCH_NAME [skip ci]"
          else
            echo "🚀 [GIT BRANCH FORK] Provisioning pristine branch [$BRANCH_NAME] initialized from stable trunk root [features/development]"
            git checkout -f -b "$BRANCH_NAME"
          fi
          
          echo "- Commit/Push changes from master to $BRANCH_NAME"
          git push origin $BRANCH_NAME
      
      # Block 1.5: Inject secure global environment parameters and service boundaries
      - name: "🔧 [ features/developmet-day-X ] Configure Machine Git Automation Credentials"
        working-directory: ${{ env.PROJECT_WORKSPACE }}
        run: |
          # Pull all commits from sub-agents
          git pull origin "features/development-day-${RUN_DAY}" --rebase || true
      
      # Block 1.6: Core State Machine execution manipulating temporal parameters and daily isolated branch forks
      - name: "🗄️ [ features/developmet-day-X ] Execute Pipeline Parameters Resolution and Git Fork Compliance"
        id: resolver
        working-directory: ${{ env.PROJECT_WORKSPACE }}
        env:
          INPUT_EXEC_MODE: ${{ github.event.inputs.execution_mode }}
          INPUT_TARGET_SCOPE: ${{ github.event.inputs.target_scope }}
          INPUT_VALUE: ${{ github.event.inputs.input_value }}
        run: |
          # 🚀 CONFIGURATION BOUNDARY: Set your exact desired state file path here
          STATE_FILE=".ai/.agents/.states/pipeline_state.json"
          
          # 🚀 HARD RESET & WIPE LOCAL CACHE: Vaporize ALL untracked, ignored, and phantom cached indexing files instantly
          git reset --hard HEAD
          git clean -ffdx
          
          # Force create parent directory dynamically if it does not exist natively
          mkdir -p "$(dirname "$STATE_FILE")"
          
          # Initialize baseline fallback state file using dynamic write overwrite directly
          if [ ! -f "$STATE_FILE" ]; then
            echo '{"current_day": 1, "current_phase": 1}' > "$STATE_FILE"
          fi
          
          # Ingest temporal indices directly utilizing atomic python parsers
          CUR_DAY=$(python3 -c "import json; print(json.load(open('$STATE_FILE'))['current_day'])")
          CUR_PHASE=$(python3 -c "import json; print(json.load(open('$STATE_FILE'))['current_phase'])")
          
          EXEC_MODE="${INPUT_EXEC_MODE:-auto_cron}"
          SCOPE="$INPUT_TARGET_SCOPE"
          VAL="$INPUT_VALUE"
          
          FINAL_DAY=$CUR_DAY
          FINAL_PHASE=$CUR_PHASE
          
          # Evaluate mathematical bounds over overridden manual user execution queries
          if [ "$EXEC_MODE" != "auto_cron" ] && [ ! -z "$VAL" ]; then
            if [ "$SCOPE" == "by_day" ]; then
              FINAL_DAY=$VAL
              FINAL_PHASE=$(( (FINAL_DAY - 1) / 6 + 1 ))
            else
              FINAL_PHASE=$VAL
              FINAL_DAY=$(( (FINAL_PHASE - 1) * 6 + 1 ))
            fi
          fi
          
          # STRICTOR COMPLIANCE RULE RAIL: Determine branch name based on finalized day calculation
          BRANCH_NAME="features/development-day-$FINAL_DAY"
          echo "🌐 [GIT WORKSPACE ROUTER] Target environment branch assigned: $BRANCH_NAME"
          
          # 🚀 HARD WRITE OVERWRITE GATE: Wipe the file locally from untracked cache BEFORE checkout
          # This fully eliminates the git conflict block on both trunk and feature branches
          rm -f "$STATE_FILE"
          git checkout -- "$STATE_FILE" 2>/dev/null || true
          
          # Ensure checkout updates tracking hooks mapping features/development as base trunk target
          git fetch origin features/development || true
          git checkout -f features/development || git checkout -f master
          
          # Initialize independent sub-branch tracking layer cleanly
          if git show-ref --verify --quiet "refs/heads/$BRANCH_NAME" || git show-ref --verify --quiet "refs/remotes/origin/$BRANCH_NAME"; then
            echo "🌿 [GIT ALREADY EXISTS] Target daily workspace branch detected. Shifting contexts..."
            # Wipe again right before shifting to the existing target daily development branch
            rm -f "$STATE_FILE"
            git checkout -f "$BRANCH_NAME"
            git merge origin/features/development --no-edit || true
          else
            echo "🚀 [GIT BRANCH FORK] Provisioning pristine branch [$BRANCH_NAME] initialized from stable trunk root [features/development]"
            git checkout -f -b "$BRANCH_NAME"
          fi
          
          # 🚀 ABSOLUTE WRITE OVERWRITE: Re-write the correct synced JSON payload right inside the active workspace branch
          mkdir -p "$(dirname "$STATE_FILE")"
          echo '{"current_day": '$FINAL_DAY', "current_phase": '$FINAL_PHASE'}' > "$STATE_FILE"
          
          # Commit parameters mutations safely into the dedicated target active daily feature workspace branch
          git add "$STATE_FILE"
          git commit -m "chore(pipeline): initialize dynamic matrix pointers for Day $FINAL_DAY on isolated branch [AI Loop]" || true
          git push origin HEAD:"refs/heads/$BRANCH_NAME" --force || true
          
          # Export string conversions matching internal sub-agent path expectations
          FORMATTED_PHASE=$(printf "%02d" $FINAL_PHASE)
          echo "run_day=$FINAL_DAY" >> $GITHUB_OUTPUT
          echo "run_phase=$FORMATTED_PHASE" >> $GITHUB_OUTPUT
  
  # ==============================================================================
  # JOBS 2-8: DYNAMIC REUSABLE SUB-AGENT DEPLOYMENT MAPPINGS
  # ==============================================================================
  run_coder:
    name: "🧑‍💻 Coder Agent Worker"
    needs: state_resolver_job
    if: |
      needs.state_resolver_job.outputs.exec_mode == 'all_scheduled' || 
      (needs.state_resolver_job.outputs.exec_mode == 'standalone_agent' && needs.state_resolver_job.outputs.standalone_target == 'coder')
    uses: ./.github/workflows/ci-cd.agent-coder.yml
    with:
      phase: ${{ needs.state_resolver_job.outputs.run_phase }}
      day: ${{ needs.state_resolver_job.outputs.run_day }}
    secrets: inherit
  
  run_tester:
    name: "🧪 Tester Agent Worker"
    needs: [state_resolver_job, run_coder]
    if: |
      always() &&
      (needs.run_coder.result == 'success' || needs.run_coder.result == 'skipped') &&
      (needs.state_resolver_job.outputs.exec_mode == 'all_scheduled' || needs.state_resolver_job.outputs.standalone_target == 'tester')
    uses: ./.github/workflows/ci-cd.agent-tester.yml
    with:
      phase: ${{ needs.state_resolver_job.outputs.run_phase }}
      day: ${{ needs.state_resolver_job.outputs.run_day }}
    secrets: inherit
  
  run_fixer:
    name: "🩹 Fixer Agent Worker"
    needs: [state_resolver_job, run_tester]
    if: |
      always() &&
      (needs.run_coder.result == 'success' || needs.run_coder.result == 'skipped') &&
      (needs.state_resolver_job.outputs.exec_mode == 'all_scheduled' || needs.state_resolver_job.outputs.standalone_target == 'fixer')
    uses: ./.github/workflows/ci-cd.agent-fixer.yml
    with:
      phase: ${{ needs.state_resolver_job.outputs.run_phase }}
      day: ${{ needs.state_resolver_job.outputs.run_day }}
    secrets: inherit
  
  run_doc:
    name: "📝 Documentation Agent Worker"
    needs: [state_resolver_job, run_fixer]
    if: |
      always() &&
      (needs.run_coder.result == 'success' || needs.run_coder.result == 'skipped') &&
      (needs.state_resolver_job.outputs.exec_mode == 'all_scheduled' || needs.state_resolver_job.outputs.standalone_target == 'doc')
    uses: ./.github/workflows/ci-cd.agent-doc.yml
    with:
      phase: ${{ needs.state_resolver_job.outputs.run_phase }}
      day: ${{ needs.state_resolver_job.outputs.run_day }}
    secrets: inherit
  
  run_dockerhub:
    name: "🐳 DockerHub Agent Worker"
    needs: [state_resolver_job, run_gcp]
    if: |
      always() &&
      (needs.run_doc.result == 'success' || needs.run_doc.result == 'skipped') &&
      needs.state_resolver_job.outputs.release_flag == 'true' &&
      (needs.state_resolver_job.outputs.exec_mode == 'all_scheduled' || needs.state_resolver_job.outputs.standalone_target == 'docker')
    uses: ./.github/workflows/ci-cd.agent-dockerhub.yml
    with:
      phase: ${{ needs.state_resolver_job.outputs.run_phase }}
      day: ${{ needs.state_resolver_job.outputs.run_day }}
    secrets: inherit
  
  run_gcp:
    name: "☁️ GCP GAR Agent Worker"
    needs: [state_resolver_job, run_doc]
    if: |
      always() &&
      (needs.run_doc.result == 'success' || needs.run_doc.result == 'skipped') &&
      needs.state_resolver_job.outputs.release_flag == 'true' &&
      (needs.state_resolver_job.outputs.exec_mode == 'all_scheduled' || needs.state_resolver_job.outputs.standalone_target == 'gcp')
    uses: ./.github/workflows/ci-cd.agent-gcp.yml
    with:
      phase: ${{ needs.state_resolver_job.outputs.run_phase }}
      day: ${{ needs.state_resolver_job.outputs.run_day }}
    secrets: inherit
  
  run_gke:
    name: "☸️ GKE Deployment Agent Worker"
    needs: [state_resolver_job, run_dockerhub]
    if: |
      always() &&
      (needs.run_doc.result == 'success' || needs.run_doc.result == 'skipped') &&
      needs.state_resolver_job.outputs.release_flag == 'true' &&
      (needs.state_resolver_job.outputs.exec_mode == 'all_scheduled' || needs.state_resolver_job.outputs.standalone_target == 'gke')
    uses: ./.github/workflows/ci-cd.agent-gke.yml
    with:
      phase: ${{ needs.state_resolver_job.outputs.run_phase }}
      day: ${{ needs.state_resolver_job.outputs.run_day }}
    secrets: inherit
  
  # ==============================================================================
  # JOB 9: AUTOMATED DAILY ADVANCED TIMELINE GATE & PUSH WORKFLOW
  # ==============================================================================
  advance_schedule_tracker:
    name: "📅 Post-Execution Upstream Integration Gate"
    needs: [state_resolver_job, run_coder, run_tester, run_fixer, run_doc, run_gke]
    if: always() && needs.state_resolver_job.outputs.exec_mode == 'all_scheduled'
    runs-on: ubuntu-latest
    
    steps:
      # Administrative gate check protecting centralized production ecosystems
      - name: "🛡️ Gatekeeper - Validate Administrative Execution Tokens"
        env:
          ALLOW_AGENTS: ${{ secrets.ALLOW_AGENTS }}
        if: ${{ env.ALLOW_AGENTS != 'true' }}
        run: |
          echo "❌ [ADMIN REJECTION] Deployment is administratively DISABLED via GitHub Secrets configuration."
          echo "Terminating workflow execution thread immediately to secure staging cloud clusters."
          exit 1
      
      # Block 9.1: Ensure we are targeting the newly customized standalone daily branch code states
      - name: "📦 Synchronize Active Daily Target Workspace Branch"
        uses: actions/checkout@v7
        with:
          ref: "features/development-day-${{ needs.state_resolver_job.outputs.run_day }}"
          path: '.'
          fetch-depth: 0
          clean: true
      
      # Block 9.1.1: Debug project check-out structure
      - name: "⚙️ Config $PROJECT_WORKSPACE enviroment after checking out"
        id: project-workspace
        run: |
          echo "PROJECT_WORKSPACE=$(pwd)" >> $GITHUB_ENV
          echo "project_workspace=$(pwd)" >> $GITHUB_OUTPUT
          echo "⚙️ >> PROJECT_WORKSPACE: ${{ env.PROJECT_WORKSPACE }}"
          
          # Debug step: Verify files exist physically in the workspace console log before AI execution path starts
          echo "🐛 [DEBUG] Auditing active workspace files presence (../../):"
          ls -la ../../
          echo "🐛 [DEBUG] Auditing active workspace files presence (../):"
          ls -la ../
          echo "🐛 [DEBUG] Auditing active workspace files presence (./):"
          ls -la ./
          echo "🐛 [DEBUG] Auditing active workspace files presence (membership-hub/):"
          if [ -d "membership-hub" ]; then ls -la membership-hub/; fi
          echo "🐛 [DEBUG] Auditing active workspace files presence (.ai/):"
          if [ -d ".ai" ]; then ls -la .ai/; fi
      
      - name: "🔧 Configure Machine Git Automation Credentials"
        working-directory: ${{ env.PROJECT_WORKSPACE }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
      
      # Block 9.2: STRICT COMPLIANCE RAIL GATE - Native verification to protect repository code integrity
      - name: "☕ Setup Hard Compilation Gate - Enterprise OpenJDK 17 Environment"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: "🟢 Setup Hard Compilation Gate - Next.js Frontend Node 20 Runtime"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # Block 9.3: Absolute Zero Error check validation run executions before remote commit permissions are unlocked
      - name: "🛡️ Execute Mandatory Strict Compilation Verification Audit Loops"
        working-directory: ${{ env.PROJECT_WORKSPACE }}
        run: |
          echo "⚡ [STRICT AUDIT GATE] Verifying newly generated source code structure assets..."
          
          # Verification Part A: Validate backend project layers compile state cleanly
          if [ -f "./sources/backend/pom.xml" ]; then
            echo "☕ Auditing Quarkus backend compile targets via native maven wrapper checks..."
            cd ./sources/backend && mvn clean test-compile -Dquarkus.analytics.disabled=true
            cd ../..
          fi
          
          # Verification Part B: Validate frontend compilation structures cleanly
          if [ -f "./sources/frontend/package.json" ]; then
            echo "🟢 Auditing Next.js frontend tree allocations via production build compilation..."
            cd ./sources/frontend
            if [ ! -d "node_modules" ]; then npm install; fi
            npm run build
            cd ../..
          fi
          echo "🎉 [STRICT AUDIT SUCCESS] Daily code assets cleared compiler validations without structural failure rejections!"
      
      # Block 9.4: Atomically increments schedule indicators inside the localized branch configuration matrix
      - name: "🗄️ Save State Indicators and Commit Generated Workspace Assets Upstream"
        working-directory: ${{ env.PROJECT_WORKSPACE }}
        env:
          RUN_DAY: ${{ needs.state_resolver_job.outputs.run_day }}
        run: |
          STATE_FILE=".ai/.plan/pipeline_state.json"
          NEXT_DAY=$(( RUN_DAY + 1 ))
          BRANCH_NAME="features/development-day-$RUN_DAY"
          
          # Ensure generated asset files from sub-agent work layers are bundled together cleanly
          git add -A
          git commit -m "prod(day-$RUN_DAY): factory-ready code verified by automated Multi-Agent Enterprise gates" || true
          
          # Increment operational calendar indicators safely if within bounds 
          if [ $NEXT_DAY -le 24 ]; then
            NEXT_PHASE=$(( (NEXT_DAY - 1) / 6 + 1 ))
            echo '{"current_day": '$NEXT_DAY', "current_phase": '$NEXT_PHASE'}' > "$STATE_FILE"
            git add "$STATE_FILE"
            git commit -m "chore(pipeline): automatic advance timeline indicator matrices to Day $NEXT_DAY [AI Runtime]" || true
          fi
          
          # Push the clean, compiled, independent daily feature branch upstream to origin remote pools safely
          echo "🚀 [PUSH WORKFLOW ACTIVE] Streaming verified compilation assets directly into upstream feature sandbox: origin/$BRANCH_NAME"
          git push origin HEAD:"refs/heads/$BRANCH_NAME" --force
