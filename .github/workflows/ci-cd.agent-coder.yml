# ==============================================================================
# рџ§‘вЂЌрџ’» CODER SUB-AGENT ISOLATED VERIFICATION WORKFLOW
# ==============================================================================
# Engineered to orchestrate autonomous business logic development tasks.
# Inputs parameters are passed down sequentially from the main orchestrator engine.
# ==============================================================================

name: "рџ‘©вЂЌрџ’» Coder Agent Worker"

on:
  workflow_call:
    inputs:
      phase:
        description: 'рџ—‚пёЏ Target Phase indicator passed from master pipeline'
        required: true
        type: string
      day:
        description: 'е­Јеє¦ Target operational execution Day number'
        required: true
        type: string

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: write
  packages: write
  id-token: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

jobs:
  execute_coder:
    name: "рџ‘©вЂЌрџ’» Execute Core Architectural Generation Task"
    runs-on: ubuntu-latest
    
    steps:
      # Check whether allow for running workflow
      - name: рџ›ЎпёЏ Gatekeeper - Validate Administrative Access
        env:
          ALLOW_AGENTS: ${{ secrets.ALLOW_AGENTS }}
        if: ${{ env.ALLOW_AGENTS != 'true' }}
        run: |
          echo "вќЊ Deployment is administratively DISABLED via GitHub Secrets (secrets.ALLOW_AGENTS is not true)."
          echo "Terminating pipeline execution immediately to protect production infrastructure."
          exit 1 # Require Admin Rights
      
      # Step 1: Clone the active daily isolated feature branch into the runner execution pool
      - name: "рџ“¦ Fetch Core Codebase Repository Assets"
        uses: actions/checkout@v7
        with:
          ref: "features/development-day-${{ inputs.day }}"
          path: '.'
          fetch-depth: 0
          clean: true
      
      # Step 1.1: Debug project check-out structure
      - name: "вљ™пёЏ Config $PROJECT_WORKSPACE enviroment after checking out"
        id: project-workspace
        run: |
          CURRENT_PWD=$(pwd)
          echo "PROJECT_WORKSPACE=$CURRENT_PWD" >> $GITHUB_ENV
          echo "project_workspace=$CURRENT_PWD" >> $GITHUB_OUTPUT
          echo "вљ™пёЏ >> PROJECT_WORKSPACE: $CURRENT_PWD"
          
          # Debug step: Verify files exist physically in the workspace console log before AI execution path starts
          echo "рџђ› [DEBUG] Auditing active workspace files presence (../../):"
          ls -la ../../
          echo "рџђ› [DEBUG] Auditing active workspace files presence (../):"
          ls -la ../
          echo "рџђ› [DEBUG] Auditing active workspace files presence (./):"
          ls -la ./
          echo "рџђ› [DEBUG] Auditing active workspace files presence (membership-hub/):"
          if [ -d "membership-hub" ]; then ls -la membership-hub/; fi
          echo "рџђ› [DEBUG] Auditing active workspace files presence (.ai/):"
          if [ -d ".ai" ]; then ls -la .ai/; fi
      
      # Step 2: Provision a clean Python 3.10 virtual space to handle core LLM prompts
      - name: "рџђЌ Provision Python 3.10 Sandboxed Runtime"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Satisfy upstream communication dependencies by executing pip manager installs
      - name: "рџ› пёЏ Install Enterprise Cloud API Connecting Libraries"
        working-directory: ${{ env.PROJECT_WORKSPACE }}
        run: |
          echo "вљЎ Upgrading deployment packet management frameworks..."
          python -m pip install --upgrade pip
          echo "рџ“¦ Securing vendor connection pipelines for generative network systems..."
          pip install requests google-generativeai openai anthropic

      # Step 4: Invoke the localized standalone architect engine to output pristine binaries
      - name: "рџ§‘вЂЌрџ’» Trigger Principal Architect LLM Generation Loop"
        working-directory: ${{ env.PROJECT_WORKSPACE }}
        env:
          PROJECT_WORKSPACE: ${{ env.PROJECT_WORKSPACE }}
          AI_MODELS_KEYS_JSON: ${{ secrets.AI_MODELS_KEYS_JSON }}
        run: |
          echo "рџљЂ Launching autonomous coder agent execution context for Day ${{ inputs.day }}..."
          python3 .ai/.agents/.sub-agents/agent-coder.py --phase "${{ inputs.phase }}" --day "${{ inputs.day }}"
      
      # if running stanalone
      - name: "рџљЂ Standalone Push - Secure Isolated Code Assets"
        # conditions in run script
        shell: bash
        run: |
          echo "рџ§© Executing immediate isolated branch push for Coder Agent..."
          
          # config GIT
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@://github.com"
          
          # add all agent works
          git add -A
          
          # Commit/Push to branch
          BRANCH_NAME="features/development-day-${{ inputs.day }}"
          git commit -m "feat(coder-standalone): dynamic architecture layer compiled for Day ${{ inputs.day }} [AI Test]" || true
          git push origin HEAD:"refs/heads/$BRANCH_NAME" --force
          echo "вњ… Standalone assets successfully pushed upstream to origin/$BRANCH_NAME"
