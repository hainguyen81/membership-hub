name: "🧑‍💻 Coder Agent Worker"

on:
  workflow_call:
    inputs:
      phase:
        required: true
        type: string
      day:
        required: true
        type: string

jobs:
  execute_coder:
    name: "🧑‍💻 Coder Agent Worker"
    runs-on: ubuntu-latest
    
    steps:
      # Check whether allow for running workflow
      - name: 🛡️ Gatekeeper - Validate Administrative Access
        env:
          ALLOW_AGENTS: ${{ secrets.ALLOW_AGENTS }}
        if: ${{ env.ALLOW_AGENTS != 'true' }}
        run: |
          echo "❌ Deployment is administratively DISABLED via GitHub Secrets (secrets.ALLOW_AGENTS is not true)."
          echo "Terminating pipeline execution immediately to protect production infrastructure."
          exit 1 # Require Admin Rights
      
      # Step 1: Clone the core architecture codebase history into the active workspace execution environment
      - name: "📦 Checkout Source Code Repository Artifacts"
        uses: actions/checkout@v4

      # Step 2: Establish the isolated Python 3.10 deployment environment required by the AI core layers
      - name: "🐍 Provision Core Python 3.10 Runtime Environment Architecture"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # Step 3: Install mandatory enterprise foundational packages to open connection pipes to external LLMs
      - name: "🛠️ Install Core Enterprise Pipeline Third-Party Dependency Libraries"
        run: pip install requests google-generativeai openai anthropic

      # Step 4: Call the specific standalone script to extract day parameters and generate the raw production code blocks
      - name: "🧑‍💻 Execute Principal Architect Code Generation Script Task"
        env:
          AI_MODELS_KEYS_JSON: ${{ secrets.AI_MODELS_KEYS_JSON }}
        run: python3 .ai/.agents/.sub-agents/agent-coder.py --phase "${{ inputs.phase }}" --day "${{ inputs.day }}"
