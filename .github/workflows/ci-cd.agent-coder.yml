# ==============================================================================
# 🧑‍💻 CODER SUB-AGENT ISOLATED VERIFICATION WORKFLOW
# ==============================================================================
# Engineered to orchestrate autonomous business logic development tasks.
# Inputs parameters are passed down sequentially from the main orchestrator engine.
# ==============================================================================

name: "🧑‍💻 Coder Agent Worker"

on:
  workflow_call:
    inputs:
      phase:
        description: '🗂️ Target Phase indicator passed from master pipeline'
        required: true
        type: string
      day:
        description: '📆 Target operational execution Day number'
        required: true
        type: string

jobs:
  execute_coder:
    name: "🧑‍💻 Execute Core Architectural Generation Task"
    runs-on: ubuntu-latest
    steps:
      # Check whether allow for running workflow
      - name: 🛡️ Gatekeeper - Validate Administrative Access
        env:
          ALLOW_AGENTS: ${{ secrets.ALLOW_AGENTS }}
        if: ${{ env.ALLOW_AGENTS != 'true' }}
        run: |
          echo "❌ Deployment is administratively DISABLED via GitHub Secrets (secrets.ALLOW_AGENTS is not true)."
          echo "Terminating pipeline execution immediately to protect production infrastructure."
          exit 1 # Require Admin Rights
      
      # Step 1: Clone the active daily isolated feature branch into the runner execution pool
      - name: "📦 Clone Workspace Branch Assets"
        uses: actions/checkout@v4

      # Step 2: Provision a clean Python 3.10 virtual space to handle core LLM prompts
      - name: "🐍 Provision Python 3.10 Sandboxed Runtime"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Enforces absolute environment consistency

      # Step 3: Satisfy upstream communication dependencies by executing pip manager installs
      - name: "🛠️ Install Enterprise Cloud API Connecting Libraries"
        run: |
          echo "⚡ Upgrading deployment packet management frameworks..."
          python -m pip install --upgrade pip
          echo "📦 Securing vendor connection pipelines for generative network systems..."
          pip install requests google-generativeai openai anthropic

      # Step 4: Invoke the localized standalone architect engine to output pristine non-blocking binaries
      - name: "🧑‍💻 Trigger Principal Architect LLM Generation Loop"
        env:
          # Ingest the comprehensive centralized secret dictionary containing API authorization credentials
          AI_MODELS_KEYS_JSON: {{ secrets.AI_MODELS_KEYS_JSON }}
        run: |
          echo "🚀 Launching autonomous coder agent execution context for Day {{ inputs.day }}..."
          python3 .ai/.agents/.sub-agents/agent-coder.py --phase "{{ inputs.phase }}" --day "{{ inputs.day }}"
