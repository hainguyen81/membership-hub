# ==============================================================================
# 🩹 FIXER SUB-AGENT SELF-HEALING REPAIR LOOP WORKFLOW
# ==============================================================================
# Provisioned with native full-stack cross-compilation system execution engines.
# Triggers automated verification builds, catches error logs, and auto-patches syntax.
# ==============================================================================

name: "🩹 Fixer Agent Worker"

on:
  workflow_call:
    inputs:
      phase:
        description: '🗂️ Target Phase indicator passed from master pipeline'
        required: true
        type: string
      day:
        description: '📆 Target operational execution Day number'
        required: true
        type: string

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: write
  packages: write
  id-token: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

jobs:
  execute_fixer:
    name: "🩹 Execute Self-Healing Compilation Test Loops"
    runs-on: ubuntu-latest
    
    # Re-config working-directory with present check-out project folder
    defaults:
      run:
        working-directory: ${{ steps.project-workspace.outputs.project_workspace }}
    
    steps:
      # Check whether allow for running workflow
      - name: 🛡️ Gatekeeper - Validate Administrative Access
        env:
          ALLOW_AGENTS: ${{ secrets.ALLOW_AGENTS }}
        if: ${{ env.ALLOW_AGENTS != 'true' }}
        run: |
          echo "❌ Deployment is administratively DISABLED via GitHub Secrets (secrets.ALLOW_AGENTS is not true)."
          echo "Terminating pipeline execution immediately to protect production infrastructure."
          exit 1 # Require Admin Rights
      
      # Step 1: Clone the active daily isolated feature branch into the runner execution pool
      - name: "📦 Clone Workspace Branch Assets"
        uses: actions/checkout@v4
        with:
          ref: "features/development-day-${{ needs.state_resolver_job.outputs.run_day }}"
          fetch-depth: 0
          clean: true     # force checkout code to root context (not ./sources, to next steps working context in ./sources)
          path: '.'
      
      # Step 1.1: Debug project check-out structure
      - name: "⚙️ Config $PROJECT_WORKSPACE enviroment after checking out"
        id: project-workspace
        run: |
          echo "PROJECT_WORKSPACE=$(pwd)" >> $GITHUB_ENV
          echo "project_workspace=$(pwd)" >> $GITHUB_OUTPUT
          echo "PROJECT_WORKSPACE: $PROJECT_WORKSPACE"
          
          # Debug step: Verify files exist physically in the workspace console log before AI execution path starts
          echo "🐛 [DEBUG] Auditing active workspace files presence:"
          ls -la ../../
          ls -la ../
          ls -la ./
          if [ -d "membership-hub" ]; then ls -la membership-hub/; fi
          if [ -d ".ai" ]; then ls -la .ai/; fi
      
      # Step 2: Establish production OpenJDK 17 binaries required to trigger Quarkus compiler tests
      - name: "☕ Mount Enterprise OpenJDK 17 Compiler Environments"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Secure clean JavaScript container runtimes to compile frontend asset bundles
      - name: "🟢 Mount Next.js Frontend Server Node.js 20 Framework"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 4: Provision a clean Python 3.10 virtual space to handle core LLM prompts
      - name: "🐍 Provision Python 3.10 Sandboxed Runtime"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 5: Satisfy upstream communication dependencies by executing pip manager installs
      - name: "🛠️ Install Enterprise Cloud API Connecting Libraries"
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai openai anthropic

      # Step 6: Start self-healing iteration pipelines intercepting native CLI stack errors
      - name: "🩹 Trigger Elite Debugger Syntactic Patch Engineering"
        env:
          PROJECT_WORKSPACE: ${{ PROJECT_WORKSPACE }}
          AI_MODELS_KEYS_JSON: ${{ secrets.AI_MODELS_KEYS_JSON }}
        run: |
          echo "🩹 Initiating compiler analysis and automated code healing routines..."
          python3 .ai/.agents/.sub-agents/agent-fixer.py --phase "${{ inputs.phase }}" --day "${{ inputs.day }}"
